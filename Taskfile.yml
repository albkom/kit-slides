version: '3'

# Pass the deck name with NAME=... (e.g. `task dev NAME=my-talk`).
# Defaults to `kpi-report` when omitted.
vars:
  NAME: '{{.NAME | default "kpi-report"}}'

tasks:
  install:
    desc: Install dependencies
    cmd: pnpm install

  new:
    desc: Scaffold a Schema A deck — deck.ts + Hello slide, no boilerplate (NAME=<deck-folder>)
    preconditions:
      - sh: '[ -n "{{.NAME}}" ] && [ "{{.NAME}}" != "kpi-report" ]'
        msg: 'Provide a NAME, e.g. `task new NAME=my-talk` (and avoid reserved names)'
      - sh: '[ ! -d "decks/{{.NAME}}" ]'
        msg: 'decks/{{.NAME}} already exists'
    cmds:
      - cp -r templates/starter decks/{{.NAME}}
      - 'echo Created decks/{{.NAME}}. Run: task dev NAME={{.NAME}}'

  new:full:
    desc: Scaffold a Schema C deck with full boilerplate — main.ts, App.vue, types, adapter stubs (NAME=<deck-folder>)
    preconditions:
      - sh: '[ -n "{{.NAME}}" ] && [ "{{.NAME}}" != "kpi-report" ]'
        msg: 'Provide a NAME, e.g. `task new:full NAME=my-talk` (and avoid reserved names)'
      - sh: '[ ! -d "decks/{{.NAME}}" ]'
        msg: 'decks/{{.NAME}} already exists'
    cmds:
      - cp -r templates/full decks/{{.NAME}}
      - 'echo Created decks/{{.NAME}}. Run: task dev NAME={{.NAME}}'

  dev:
    desc: Start dev server for a deck (NAME=<deck-folder>, default kpi-report)
    env:
      KIT_DECK: '{{.NAME}}'
    cmd: pnpm dev

  dev:pdf:
    desc: Dev server with PDF auto-export (NAME=<deck-folder>)
    env:
      KIT_DECK: '{{.NAME}}'
    cmd: pnpm dev:pdf

  build:
    desc: Build a deck for production (NAME=<deck-folder>)
    env:
      KIT_DECK: '{{.NAME}}'
    cmd: pnpm build

  preview:
    desc: Preview production build
    cmd: pnpm preview

  pdf:
    desc: Export slides to PDF
    cmd: pnpm pdf
