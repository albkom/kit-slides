version: '3'

# Pass the deck name with NAME=... (e.g. `task dev NAME=my-talk`).
# Defaults to `starter` when omitted.
vars:
  NAME: '{{.NAME | default "starter"}}'

tasks:
  install:
    desc: Install dependencies
    cmd: pnpm install

  playground:
    desc: Start playground dev server (component explorer, no CSV required)
    cmd: pnpm --filter playground dev

  new:
    desc: Scaffold a new deck from templates/starter (NAME=<deck>)
    preconditions:
      - sh: '[ -n "{{.NAME}}" ] && [ "{{.NAME}}" != "starter" ]'
        msg: 'Provide NAME=<deck-name> (and avoid reserved names like "starter")'
      - sh: '[ ! -d "examples/{{.NAME}}" ]'
        msg: 'examples/{{.NAME}} already exists'
    cmds:
      - cp -r templates/starter examples/{{.NAME}}
      - 'echo Created examples/{{.NAME}}. Run: task dev NAME={{.NAME}}'

  new:from:
    desc: Copy an existing deck, excluding data (SOURCE=<deck> NAME=<nuovo-deck>)
    preconditions:
      - sh: '[ -n "{{.SOURCE}}" ] && [ -d "examples/{{.SOURCE}}" ]'
        msg: 'Provide SOURCE=<existing-deck>, e.g. `task new:from SOURCE=starter NAME=my-talk`'
      - sh: '[ -n "{{.NAME}}" ] && [ "{{.NAME}}" != "starter" ]'
        msg: 'Provide NAME=<new-deck> (and avoid reserved names)'
      - sh: '[ ! -d "examples/{{.NAME}}" ]'
        msg: 'examples/{{.NAME}} already exists'
    cmds:
      - cp -r examples/{{.SOURCE}} examples/{{.NAME}}
      - rm -rf examples/{{.NAME}}/public/data
      - 'echo Created examples/{{.NAME}} from {{.SOURCE}}. Run: task dev NAME={{.NAME}}'

  dev:
    desc: Start dev server for a deck (NAME=<deck-folder>, default starter)
    env:
      KIT_DECK: '{{.NAME}}'
    cmd: pnpm dev

  dev:pdf:
    desc: Dev server with PDF auto-export (NAME=<deck-folder>)
    env:
      KIT_DECK: '{{.NAME}}'
    cmd: pnpm dev:pdf

  build:
    desc: Build a deck for production (NAME=<deck-folder>)
    env:
      KIT_DECK: '{{.NAME}}'
    cmd: pnpm build

  preview:
    desc: Preview production build
    cmd: pnpm preview

  pdf:
    desc: Export slides to PDF
    cmd: pnpm pdf
